apiVersion: apps/v1
kind: Deployment
metadata:
  name: sudoku-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sudoku-redis
  template:
    metadata:
      labels:
        app: sudoku-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
